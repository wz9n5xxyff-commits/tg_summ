name: Telegram Auto Digest

on:
  schedule:
    # Run every Sunday at 18:00 UTC (21:00 MSK)
    - cron: '0 18 * * 0'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  run-digest:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Auto Digest Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHANNEL_ID: ${{ secrets.TG_CHANNEL_ID }}
        TG_TEST_CHANNEL_ID: ${{ secrets.TG_TEST_CHANNEL_ID }}
        IS_TEST: "false" # Set to "true" if you want to post to a test channel only
      run: python main.py
